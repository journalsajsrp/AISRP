<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - المؤسسة الدولية للنشر العلمي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-box img {
            max-width: 150px;
            margin-bottom: 20px;
        }
        h2 {
            color: #0d233a;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #0d233a;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #0d233a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #1a365d;
        }
        .error-message {
            color: #e53e3e;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-box">
        <!-- تم وضع اسم الشعار الخاص بك هنا ليعمل تلقائياً -->
        <img src="pageHeaderTitleImage_ar.png" alt="شعار المؤسسة">
    </div>
    <h2>تسجيل دخول الأعضاء</h2>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label for="username">اسم المستخدم:</label>
            <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="input-group">
            <label for="password">كلمة المرور:</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">تسجيل الدخول</button>
        <div id="errorMessage" class="error-message">اسم المستخدم أو كلمة المرور غير صحيحة!</div>
    </form>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();
        
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        // يمكنك تعديل الحساب وكلمة المرور من هنا يدوياً لأي يوزر تريده
        const correctUsername = "admin";
        const correctPassword = "123456";

        if (usernameInput === correctUsername && passwordInput === correctPassword) {
            // حفظ حالة تسجيل الدخول في المتصفح لمنع التزييف
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', usernameInput);
            
            // التوجيه إلى صفحة الملف الشخصي
            window.location.href = 'profile.html';
        } else {
            errorDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
